<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Members</title>

<link rel="stylesheet" href="dashboard.css">

<style>

body{
    background:#f4f4f4;
    font-family:Arial;
}

.container{
    width:90%;
    margin:40px auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#ff3b3b;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

th{
    background:#ff3b3b;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f1f1f1;
}

.edit{

background:green;
color:white;
padding:8px 15px;
text-decoration:none;
border-radius:5px;

}

.delete{

background:red;
color:white;
padding:8px 15px;
text-decoration:none;
border-radius:5px;

}

</style>

</head>

<body>

<div class="container">

<h1>All Gym Members</h1>

<div class="search-box">

<form action="/search" method="get">

<input
type="text"
name="keyword"
placeholder="🔍 Search Member by Name">

<button
class="search-btn"
type="submit">

Search

</button>

<a
class="show-btn"
href="/members">

Show All

</a>

</form>

</div>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Gender</th>
<th>Age</th>
<th>Membership</th>
<th>Action</th>

</tr>

<tr th:each="member : ${members}">

<td th:text="${member.id}"></td>

<td th:text="${member.name}"></td>

<td th:text="${member.email}"></td>

<td th:text="${member.phone}"></td>

<td th:text="${member.gender}"></td>

<td th:text="${member.age}"></td>

<td th:text="${member.membership}"></td>

<td>

<a class="edit"
th:href="@{/edit/{id}(id=${member.id})}">
Edit
</a>

<a class="delete"
th:href="@{/delete/{id}(id=${member.id})}">
Delete
</a>

</td>

</tr>

</table>

</div>

</body>
</html>
